# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://192.168.50.254:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "192.168.50.254"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "k8s-0"
    ipAddress: "192.168.50.150"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/bca8b14bc59757105cbfd120465d1c07fb60a89b05e807751f4842ec736068af
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "00:be:43:ed:55:1e"
        dhcp: false
        addresses:
          - "192.168.50.150/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.50.1"
        mtu: 1500
        vip:
          ip: "192.168.50.254"
  - hostname: "k8s-1"
    ipAddress: "192.168.50.151"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/bca8b14bc59757105cbfd120465d1c07fb60a89b05e807751f4842ec736068af
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "b8:85:84:c0:fe:6c"
        dhcp: false
        addresses:
          - "192.168.50.151/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.50.1"
        mtu: 1500
        vip:
          ip: "192.168.50.254"
  - hostname: "k8s-2"
    ipAddress: "192.168.50.152"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/bca8b14bc59757105cbfd120465d1c07fb60a89b05e807751f4842ec736068af
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "b8:85:84:c3:bd:cc"
        dhcp: false
        addresses:
          - "192.168.50.152/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.50.1"
        mtu: 1500
        vip:
          ip: "192.168.50.254"

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/admission-controller-patch.yaml"
    - "@./patches/controller/cluster.yaml"

